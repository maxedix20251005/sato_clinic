    <main>
        <section class="reserve-section" id="web-questionnaire">
            <div class="container main-container">
                <h2 class="section-title"><span class="lang-toggle lang-ja">WEB問診票</span><span class="lang-toggle lang-en">Online Intake Form</span></h2>
                <div class="reserve-form-container">
                    <p><span class="lang-toggle lang-ja">受診前の確認事項をご入力ください。内容は診療にのみ利用し、個人情報は厳重に管理します。</span><span class="lang-toggle lang-en">Please answer the questions below before your visit. The information is used only for your care and is handled securely.</span></p>
                    <form class="reserve-form" action="#" method="post">
                        <div class="form-group">
                            <label for="q-name"><span class="lang-toggle lang-ja">お名前</span><span class="lang-toggle lang-en">Full Name</span> <span class="required">*</span></label>
                            <input type="text" id="q-name" name="q-name" required>
                        </div>
                        <div class="form-group">
                            <label for="q-birthday"><span class="lang-toggle lang-ja">生年月日</span><span class="lang-toggle lang-en">Date of Birth</span> <span class="required">*</span></label>
                            <input type="date" id="q-birthday" name="q-birthday" required>
                        </div>
                        <div class="form-group">
                            <label for="q-phone"><span class="lang-toggle lang-ja">電話番号</span><span class="lang-toggle lang-en">Phone</span> <span class="required">*</span></label>
                            <input type="tel" id="q-phone" name="q-phone" required>
                        </div>
                        <div class="form-group">
                            <label for="q-email"><span class="lang-toggle lang-ja">メールアドレス</span><span class="lang-toggle lang-en">Email</span></label>
                            <input type="email" id="q-email" name="q-email">
                        </div>
                        <div class="form-group">
                            <label for="q-chief"><span class="lang-toggle lang-ja">主訴（気になる症状）</span><span class="lang-toggle lang-en">Main Concern / Symptoms</span> <span class="required">*</span></label>
                            <textarea id="q-chief" name="q-chief" rows="3" data-placeholder-ja="例）咳が続く、発熱、頭痛など" data-placeholder-en="e.g., persistent cough, fever, headache" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="q-onset"><span class="lang-toggle lang-ja">症状が始まった時期</span><span class="lang-toggle lang-en">When did it start?</span></label>
                            <input type="text" id="q-onset" name="q-onset" data-placeholder-ja="例）3日前から、1週間前から" data-placeholder-en="e.g., since 3 days ago / 1 week ago">
                        </div>
                        <div class="form-group">
                            <label><span class="lang-toggle lang-ja">発熱はありますか？</span><span class="lang-toggle lang-en">Do you have a fever?</span></label>
                            <div class="time-status-row">
                                <label><input type="radio" name="q-fever" value="yes"> <span class="lang-toggle lang-ja">はい</span><span class="lang-toggle lang-en">Yes</span></label>
                                <label><input type="radio" name="q-fever" value="no"> <span class="lang-toggle lang-ja">いいえ</span><span class="lang-toggle lang-en">No</span></label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="q-temp"><span class="lang-toggle lang-ja">現在の体温（わかれば）</span><span class="lang-toggle lang-en">Current temperature (if known)</span></label>
                            <input type="text" id="q-temp" name="q-temp" data-placeholder-ja="例）37.8℃" data-placeholder-en="e.g., 37.8°C">
                        </div>
                        <div class="form-group">
                            <label for="q-med"><span class="lang-toggle lang-ja">服用中の薬・サプリ</span><span class="lang-toggle lang-en">Current medications / supplements</span></label>
                            <textarea id="q-med" name="q-med" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="q-allergy"><span class="lang-toggle lang-ja">アレルギー歴</span><span class="lang-toggle lang-en">Allergies</span></label>
                            <textarea id="q-allergy" name="q-allergy" rows="2" data-placeholder-ja="薬・食べ物・ラテックスなど" data-placeholder-en="Medications, foods, latex, etc."></textarea>
                        </div>
                        <div class="form-group">
                            <label><span class="lang-toggle lang-ja">妊娠の可能性はありますか？</span><span class="lang-toggle lang-en">Is there a chance you are pregnant?</span></label>
                            <div class="time-status-row">
                                <label><input type="radio" name="q-pregnant" value="yes"> <span class="lang-toggle lang-ja">はい</span><span class="lang-toggle lang-en">Yes</span></label>
                                <label><input type="radio" name="q-pregnant" value="no"> <span class="lang-toggle lang-ja">いいえ</span><span class="lang-toggle lang-en">No</span></label>
                                <label><input type="radio" name="q-pregnant" value="na"> <span class="lang-toggle lang-ja">該当しない</span><span class="lang-toggle lang-en">Not applicable</span></label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="q-other"><span class="lang-toggle lang-ja">その他伝えておきたいこと</span><span class="lang-toggle lang-en">Anything else we should know</span></label>
                            <textarea id="q-other" name="q-other" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" name="q-consent" required> <span class="lang-toggle lang-ja">記載内容が診療に利用されることに同意します。</span><span class="lang-toggle lang-en">I agree this information will be used for my medical care.</span></label>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-pill btn-primary"><span class="lang-toggle lang-ja">送信する</span><span class="lang-toggle lang-en">Submit</span></button>
                            <button type="reset" class="btn-pill btn-secondary"><span class="lang-toggle lang-ja">リセット</span><span class="lang-toggle lang-en">Reset</span></button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
